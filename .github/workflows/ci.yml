name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**.ts"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "**.ts"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Run format and lint
        run: npm run lint
